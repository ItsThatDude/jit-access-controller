## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enable: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enable: true

  ## Existing ServiceAccount name (only when enable=false)
  ## Note: When enable=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enable: true
  # Metrics server port
  port: 8443
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: true

## Webhook server configuration
##
webhook:
  enable: true
  # Webhook server port
  port: 9443

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

## Frontend configuration
##
frontend:
  enable: true
    
  replicas: 1

  port: 8080

  impersonation:
    enable: false
    constrained: false

  oidc:
    secretRef: "frontend-oidc"
    authorityKey: "authority"
    clientIdKey: "clientId"
    clientSecretKey: "clientSecret"
    nameClaimKey: "nameClaim"

  dataprotection:
    storage:
      enable: true
      size: 100Mi
    encryption:
      enable: false
      secretRef: 'jit-access-frontend-dataprotection'
      certificateKey: 'dataprotection.pfx'
      passphraseKey: 'passphrase'

  container:
    image:
      repository: itsthatdood/jit-access-frontend
      tag: latest
    imagePullPolicy: Always
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    env: []
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8080
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /healthz
        port: 8080
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"

  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  terminationGracePeriodSeconds: 10
  serviceAccountName: jit-access-frontend

  ingress:
    enable: true
    annotations: []
    className: ""
    tls:
      - hosts:
        - x.y.z
        secretName: ""
    hosts:
      - host: x.y.z
        paths:
          - path: '/'
            pathType: Prefix